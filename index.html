<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will's and Jess' Books</title>
    <script src="https://unpkg.com/vue@3.0.2"></script>

<style>
    table {
      margin-bottom: 20px;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.5);

      display: flex;
      justify-content: center;
      align-items: center;

      z-index: 9999;
    }

    .modal {
      background: white;
      padding: 20px;
      border-radius: 8px;
      min-width: 300px;
      max-width: 500px;
    }
</style>


</head>
<body>
    <div id="app">
      <div v-if="WillJess == 0">
        <h2 >Will's Books</h2>
        <button style="margin-bottom: 20px;" @click="WillJess = 1">Switch to Jess' Books</button>
      </div>
      <div v-else>
        <h2 >Jess' Books</h2>
        <button style="margin-bottom: 20px;" @click="WillJess = 0">Switch to Will's Books</button>
      </div>

  <button style="margin-bottom: 20px;" @click="showAdd = true">Add Book</button>
  <div v-if="showAdd" class="overlay">
  <div class="modal">
    <h3>Add Book</h3>

    <input v-model="newBook.Title" placeholder="Title">
    <input v-model="newBook.Author" placeholder="Author">
    <input v-model="newBook.Year" placeholder="Year Read">
    <input v-model="newBook.Rating" placeholder="Rating/10">
    <textarea v-model="newBook.Thoughts" placeholder="Your thoughts..." rows="6" cols="40"></textarea>

    <button @click="addBook">Save Book</button>
    <button @click="showAdd = false">Close</button>
  </div>
</div>

<table border="1">
  <thead>
    <tr>
      <th>Title</th>
      <th>Author</th>
      <th>Year Read</th>
      <th>Rating/10</th>
      <th></th>
    </tr>
  </thead>

  <tbody>
    <template v-for="book in books[WillJess]">
      
      <tr>
        <td>{{ book.Title }}</td>
        <td>{{ book.Author }}</td>
        <td>{{ book.Year }}</td>
        <td>{{ book.Rating }}</td>
        <td>
          <button @click="openBook(book)">Show thoughts</button>
          <button @click="deleteBook(book.id)">X</button>
        </td>
      </tr>

    </template>
  </tbody>
</table>



    <div v-if="showingBook"
         class="overlay"
         @click="closeBook">

      <div class="modal" @click.stop>
        <h3>
          Thoughts on {{ showingBook.Title }}
        </h3>

        <p>{{ showingBook.Thoughts }}</p>

        <button @click="closeBook">Close</button>
      </div>

    </div>


  </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
